ButtonA             = Button(3)
ButtonB             = Button(4)
ButtonX             = Button(1)
ButtonY             = Button(2)
ButtonLB            = Button(5)
ButtonRB            = Button(6) 
TriggerLT           = Button(7)
TriggerRT           = Button(8)
